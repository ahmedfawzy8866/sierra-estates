name: CI Build and Optimize

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci || npm install

    - name: Build and Optimize Next.js App
      run: npm run build
      env:
        # Pass mock API keys or env vars required during the build phase
        NEXT_PUBLIC_FIREBASE_API_KEY: "mock_key_for_build"
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "mock_domain_for_build"
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: "mock_project_for_build"
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "mock_bucket_for_build"
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "mock_sender_for_build"
        NEXT_PUBLIC_FIREBASE_APP_ID: "mock_app_id_for_build"
